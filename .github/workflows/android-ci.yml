name: Android CI Debug Validation

on:
  workflow_dispatch:

jobs:
  debug-validation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run Debug static checks and unit tests (without emulator)
        run: ./gradlew --no-daemon --console=plain --info clean lint testDebugUnitTest

      - name: Publish Debug unit test summary
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: 'app/build/test-results/testDebugUnitTest/*.xml'
          check_name: Debug Unit Test Results
          detailed_summary: true
          fail_on_failure: true

      - name: Upload Debug unit test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-unit-test-reports
          path: |
            app/build/reports/tests/testDebugUnitTest
            app/build/test-results/testDebugUnitTest

      - name: Build Debug APK
        run: ./gradlew --no-daemon assembleDebug

      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
