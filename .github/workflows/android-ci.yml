name: Android CI (No Emulator)

on:
  workflow_dispatch:
jobs:
  test-without-emulator:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Run static checks and unit tests (without emulator)
        run: ./gradlew --no-daemon --console=plain --info clean lint testDebugUnitTest

      - name: Publish unit test summary
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: 'app/build/test-results/testDebugUnitTest/*.xml'
          check_name: Unit Test Results (Debug)
          detailed_summary: true
          fail_on_failure: true

      - name: Upload unit test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: |
            app/build/reports/tests/testDebugUnitTest
            app/build/test-results/testDebugUnitTest

      - name: Build debug APK
        run: ./gradlew --no-daemon assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
