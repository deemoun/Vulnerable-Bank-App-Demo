name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: APK build type
        required: true
        default: debug
        type: choice
        options:
          - debug
          - production

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build ${{ inputs.build_type }} APK
        env:
          BUILD_TYPE: ${{ inputs.build_type }}
        run: ./scripts/ci-build-apk.sh

      - name: Upload ${{ inputs.build_type }} APK
        uses: actions/upload-artifact@v4
        with:
          name: vulnerable-bank-${{ inputs.build_type }}-apk
          path: artifacts/app-${{ inputs.build_type }}.apk
          if-no-files-found: error
